<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GenPhantomX - 絶対支配の特異点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 10px #0ff;
            z-index: 10;
            font-family: 'Courier New', monospace;
        }

        #frequency-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 100px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            border-radius: 5px;
            padding: 10px;
            z-index: 10;
        }

        #frequency-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 80px;
            gap: 3px;
        }

        .bar {
            width: 8px;
            background: linear-gradient(to top, #0ff, #00ff00, #ff00ff);
            border-radius: 2px;
            min-height: 2px;
        }

        #title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #ff00ff;
            z-index: 5;
            pointer-events: none;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 14px;
            color: #ff00ff;
            margin-top: 10px;
            text-shadow: 0 0 10px #ff00ff;
        }

        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #0ff;
            font-size: 12px;
            text-shadow: 0 0 10px #0ff;
            z-index: 10;
            font-family: 'Courier New', monospace;
        }

        /* START ボタン */
        #startButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 60px;
            font-size: 28px;
            font-weight: bold;
            color: #000;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: 3px solid #0ff;
            border-radius: 15px;
            cursor: pointer;
            z-index: 100;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            box-shadow: 0 0 30px #00ffff, 0 0 60px #ff00ff;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            -webkit-appearance: none;
            appearance: none;
        }

        #startButton:hover {
            box-shadow: 0 0 50px #00ffff, 0 0 100px #ff00ff;
            transform: translate(-50%, -50%) scale(1.1);
            text-shadow: 0 0 20px rgba(255, 0, 255, 1);
        }

        #startButton:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #startButton.hidden {
            display: none;
        }

        /* エラーメッセージ */
        #errorMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 40px;
            font-size: 16px;
            color: #ff6600;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff6600;
            border-radius: 10px;
            z-index: 100;
            text-align: center;
            font-family: 'Courier New', monospace;
            display: none;
            max-width: 80%;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #errorMessage.show {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <div>GenPhantomX - 幻神文明の顕現</div>
        <div>会長GPXレーベル 絶対神殿</div>
        <div style="margin-top: 10px; font-size: 12px;">
            スペースキーでリセット
        </div>
    </div>

    <button id="startButton">
        絶対支配領域を展開<br>
        <span style="font-size: 14px;">( START )</span>
    </button>

    <div id="errorMessage"></div>

    <div id="title">
        <div>GENPHANTOMX</div>
        <div class="subtitle">〜 絶対支配の特異点 〜</div>
    </div>

    <div id="frequency-display">
        <div id="frequency-bars"></div>
    </div>

    <div id="status">
        <div>Status: Ready</div>
        <div id="frequency-value">Frequency: 0 Hz</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
