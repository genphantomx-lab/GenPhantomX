<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GenPhantomX - GODPHANTOMX FINAL FORM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #000a15 0%, #001a2e 50%, #000a15 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: contrast(1.15) brightness(1.05);
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 12px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            z-index: 10;
            letter-spacing: 1px;
            line-height: 1.8;
            background: rgba(0, 20, 40, 0.85);
            padding: 15px;
            border: 2px solid #00ffff;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        #frequency-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 100%;
            max-width: 600px;
            height: 140px;
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 12px;
            z-index: 10;
            box-shadow: 0 0 40px #00ffff, inset 0 0 40px rgba(0, 255, 255, 0.15);
        }

        #frequency-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 110px;
            gap: 2px;
        }

        .bar {
            width: 5px;
            background: linear-gradient(to top, #0ff, #00ff00, #ff00ff, #00ffff);
            border-radius: 1px;
            min-height: 2px;
            filter: brightness(1.3) drop-shadow(0 0 3px currentColor);
            box-shadow: 0 0 8px currentColor;
        }

        #title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 40px #00ffff, 0 0 80px #ff00ff, 0 0 120px #9900ff;
            z-index: 5;
            pointer-events: none;
            font-size: 52px;
            font-weight: bold;
            letter-spacing: 6px;
        }

        .subtitle {
            font-size: 18px;
            color: #ff00ff;
            margin-top: 15px;
            text-shadow: 0 0 25px #ff00ff, 0 0 50px #9900ff;
            letter-spacing: 3px;
        }

        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ffff;
            font-size: 12px;
            text-shadow: 0 0 15px #00ffff;
            z-index: 10;
            background: rgba(0, 20, 40, 0.9);
            padding: 15px;
            border: 2px solid #ff00ff;
            border-radius: 8px;
            line-height: 1.9;
            min-width: 200px;
            box-shadow: 0 0 30px #ff00ff;
        }

        /* コントロールパネル */
        #controlPanel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid #9900ff;
            border-radius: 8px;
            padding: 15px;
            z-index: 10;
            box-shadow: 0 0 30px #9900ff;
            max-height: 400px;
            overflow-y: auto;
        }

        .control-section {
            margin-bottom: 12px;
            border-bottom: 1px solid #00ffff;
            padding-bottom: 10px;
        }

        .control-label {
            color: #00ff88;
            font-size: 11px;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-btn {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            color: #000;
            border: 1px solid #00ffff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            margin: 3px;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.8);
        }

        .control-btn:hover {
            box-shadow: 0 0 20px #00ffff;
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        /* START ボタン */
        #startButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 45px 90px;
            font-size: 36px;
            font-weight: bold;
            color: #000;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #9900ff, #00ffff);
            background-size: 400% 400%;
            border: 4px solid #00ffff;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            text-shadow: 0 0 20px rgba(255, 0, 255, 1);
            box-shadow: 0 0 60px #00ffff, 0 0 120px #ff00ff, 0 0 180px #9900ff;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            -webkit-appearance: none;
            appearance: none;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #startButton:hover {
            box-shadow: 0 0 100px #00ffff, 0 0 180px #ff00ff, 0 0 260px #9900ff;
            transform: translate(-50%, -50%) scale(1.2);
            text-shadow: 0 0 40px rgba(255, 0, 255, 1);
        }

        #startButton:active {
            transform: translate(-50%, -50%) scale(0.85);
        }

        #startButton.hidden {
            display: none;
        }

        /* エラーメッセージ */
        #errorMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px 50px;
            font-size: 18px;
            color: #ff6600;
            background: rgba(0, 0, 0, 0.98);
            border: 3px solid #ff6600;
            border-radius: 15px;
            z-index: 100;
            text-align: center;
            display: none;
            max-width: 85%;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-shadow: 0 0 60px #ff6600;
        }

        #errorMessage.show {
            display: block;
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.7);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* スクロールバー */
        #controlPanel::-webkit-scrollbar {
            width: 6px;
        }

        #controlPanel::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.1);
        }

        #controlPanel::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 3px;
        }

        /* 波形表示 */
        #waveformContainer {
            position: absolute;
            bottom: 180px;
            right: 20px;
            width: 300px;
            height: 100px;
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 10px;
            z-index: 10;
            box-shadow: 0 0 30px #00ff88;
        }

        #waveform {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <div style="font-size: 14px; margin-bottom: 8px; color: #ff00ff;">⚡ GODPHANTOMX FINAL FORM ⚡</div>
        <div>絶対支配領域 - 全次元空間統合</div>
        <div>会長GPXレーベル 最高神殿</div>
        <div style="margin-top: 10px; font-size: 11px; color: #00ff88;">
            🎤 マイク: 空間支配<br>
            🎵 周波数: 次元歪み<br>
            ✨ AI: 自動反応<br>
            🎨 VJ: リアルタイム
        </div>
    </div>

    <button id="startButton">
        絶対支配領域を展開<br>
        <span style="font-size: 22px;">( GODPHANTOMX )</span>
    </button>

    <div id="errorMessage"></div>

    <div id="title">
        <div>GODPHANTOMX</div>
        <div class="subtitle">〜 全知全能の絶対支配 〜</div>
    </div>

    <div id="frequency-display">
        <div id="frequency-bars"></div>
    </div>

    <div id="waveformContainer">
        <canvas id="waveform"></canvas>
    </div>

    <div id="status">
        <div style="font-size: 16px; color: #ff00ff; margin-bottom: 10px;">🔴 STATUS</div>
        <div>Ready</div>
        <div id="frequency-value">Frequency: 0 Hz</div>
        <div id="bass-value">Bass: 0</div>
        <div id="mid-value">Mid: 0</div>
        <div id="treble-value">Treble: 0</div>
        <div id="beat-value" style="color: #00ff88;">Beat: OFF</div>
        <div id="theme-value">Theme: Dark</div>
    </div>

    <div id="controlPanel">
        <div class="control-section">
            <div class="control-label">⚙️ THEME</div>
            <button class="control-btn" onclick="changeTheme('dark')">Dark</button>
            <button class="control-btn" onclick="changeTheme('neon')">Neon</button>
            <button class="control-btn" onclick="changeTheme('cyber')">Cyber</button>
            <button class="control-btn" onclick="changeTheme('zen')">Zen</button>
        </div>

        <div class="control-section">
            <div class="control-label">🎮 EFFECTS</div>
            <button class="control-btn" onclick="toggleEffect('bloom')">Bloom</button>
            <button class="control-btn" onclick="toggleEffect('trail')">Trail</button>
            <button class="control-btn" onclick="toggleEffect('wave')">Wave</button>
            <button class="control-btn" onclick="toggleEffect('fractal')">Fractal</button>
        </div>

        <div class="control-section">
            <div class="control-label">🎵 BEAT</div>
            <button class="control-btn" onclick="toggleBeatDetection()">Auto Detect</button>
            <button class="control-btn" onclick="recordGif()">REC GIF</button>
            <button class="control-btn" onclick="saveScreenshot()">SHOT</button>
        </div>

        <div class="control-section">
            <div class="control-label">🔧 SETTINGS</div>
            <button class="control-btn" onclick="toggleParticles()">Particles</button>
            <button class="control-btn" onclick="toggleRing()">Ring</button>
            <button class="control-btn" onclick="resetAll()">RESET</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
